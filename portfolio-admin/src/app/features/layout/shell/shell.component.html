<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">dashboard</mat-icon>
      <span class="logo-text">Portfolio Admin</span>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          @if (item.badge && unreadCount() > 0) {
            <mat-icon
              matListItemIcon
              [matBadge]="unreadCount()"
              matBadgeColor="warn"
              matBadgeSize="small"
            >{{ item.icon }}</mat-icon>
          } @else {
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          }
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content-area">
    <mat-toolbar color="primary" class="toolbar">
      <span class="toolbar-spacer"></span>
      <span class="user-name">
        <mat-icon>account_circle</mat-icon>
        {{ currentUser()?.fullName || currentUser()?.email || 'Admin' }}
      </span>
      <button mat-icon-button (click)="logout()" matTooltip="Logout" aria-label="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

<style>
  .sidenav-container {
    height: 100vh;
  }

  .sidenav {
    width: 240px;
    background-color: #1a1a2e;
    color: white;
    color-scheme: dark;
  }

  /* Force white text for Material list items inside the dark sidenav */
  .sidenav .mdc-list-item__primary-text,
  .sidenav .mat-mdc-list-item-title,
  .sidenav .mat-mdc-list-item span,
  .sidenav .mat-mdc-nav-list .mdc-list-item {
    color: rgba(255, 255, 255, 0.87) !important;
  }

  .sidenav mat-icon {
    color: rgba(255, 255, 255, 0.7);
  }

  .sidenav-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 8px;
  }

  .logo-icon {
    color: #7c4dff;
    font-size: 28px;
    width: 28px;
    height: 28px;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 600;
    color: white;
  }

  .sidenav mat-nav-list a {
    color: rgba(255, 255, 255, 0.7);
    border-radius: 8px;
    margin: 2px 8px;
  }

  .sidenav mat-nav-list a.active-link {
    background-color: rgba(124, 77, 255, 0.2);
    color: white;
  }

  .sidenav mat-nav-list a.active-link mat-icon {
    color: #7c4dff;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .toolbar-spacer {
    flex: 1;
  }

  .user-name {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-right: 8px;
    font-size: 14px;
  }

  .page-content {
    padding: 24px;
    min-height: calc(100vh - 64px);
    background-color: #f5f5f5;
  }
</style>
